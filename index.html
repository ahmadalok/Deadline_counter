<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deadline Counter</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

    <h1 class="app-title">⏳ Deadline Counter</h1>

    <div class="input-section">
        <input type="text" id="project-name" placeholder="What is your project?" />
        <input type="date" id="deadline-date" />
        <button id="set-btn">Set Deadline</button>
    </div>

    <div class="display-section" id="display-section">
        <h2 id="project-title"></h2>
        <div class="countdown">
            <div class="time-block">
                <span id="days">0</span>
                <label>days</label>
            </div>
            <div class="time-block">
                <span id="hours">0</span>
                <label>hours</label>
            </div>
            <div class="time-block">
                <span id="minutes">0</span>
                <label>minutes</label>
            </div>
            <div class="time-block">
                <span id="seconds">0</span>
                <label>seconds</label>
            </div>
        </div>
        <p id="message"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
